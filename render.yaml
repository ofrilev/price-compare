services:
  - type: web
    name: price-scraper-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: price-scraper-data
      mountPath: /app/data
      sizeGB: 1
